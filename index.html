<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>乐美文化AIGC</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0b0b0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{width:100%;max-width:390px;text-align:center}
  .mark{width:78px;height:78px;border-radius:18px;margin:0 auto 18px;background:#fff;
        display:flex;align-items:center;justify-content:center;color:#111;font-weight:800;font-size:24px}
  .logo{font-size:28px;font-weight:800;margin-bottom:8px}
  .sub{font-size:14px;color:#b8b8c4;margin-bottom:30px;line-height:1.6}
  .btn{display:block;width:100%;padding:16px 0;background:#fe2c55;color:#fff;
       border:0;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn.secondary{margin-top:12px;background:#23232b;font-size:15px}
  .btn:active{transform:translateY(1px)}
  .tip{display:none;margin-top:18px;padding:16px;background:#191922;border:1px solid #2b2b35;
       border-radius:8px;font-size:15px;color:#ddd;line-height:1.85;text-align:left}
  .tip.show{display:block}
  .account{margin-top:18px;padding:12px 14px;border:1px solid #2b2b35;border-radius:8px;color:#ddd;font-size:14px}
  .muted{margin-top:18px;color:#8f8f9d;font-size:13px;line-height:1.7}
  b{color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="mark">LM</div>
  <div class="logo">乐美文化AIGC</div>
  <div class="sub">AI短剧 · 广告影像 · 企业宣传<br>一站式 AI 视频解决方案</div>
  <a class="btn" href="#" onclick="go(event)">打开抖音主页</a>
  <button class="btn secondary" onclick="copyAccount()">复制抖音号</button>
  <div class="tip" id="tip">
    当前在微信内打开。微信会拦截抖音链接，请点击右上角菜单，选择「<b>在浏览器中打开</b>」，然后会自动进入抖音主页。
  </div>
  <div class="account">抖音号：<b>1556511979</b></div>
  <div class="muted" id="copyState">微信无法直接打开时，可复制抖音号到抖音搜索。</div>
</div>
<script>
var target='https://www.douyin.com/user/MS4wLjABAAAAxYZ64xZOyD6HeZlTF-Jfc6JexLGND78urBHj-YkFHMw';
function go(e){e.preventDefault();
  var ua=navigator.userAgent.toLowerCase();
  var isWx=ua.indexOf('micromessenger')>-1;
  if(isWx){document.getElementById('tip').classList.add('show');return}
  window.location.href=target
}
function copyAccount(){
  var text='1556511979';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      document.getElementById('copyState').textContent='已复制抖音号：1556511979';
    });
  }else{
    document.getElementById('copyState').textContent='抖音号：1556511979';
  }
}
(function(){
  var ua=navigator.userAgent.toLowerCase();
  if(ua.indexOf('micromessenger')===-1){
    setTimeout(function(){window.location.href=target},800)
  }
})()
</script>
</body>
</html>

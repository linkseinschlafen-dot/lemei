<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>乐美文化AIGC</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f3f0ec;color:#5c4f47;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  body.is-wechat{align-items:flex-start;padding-top:116px}
  .card{width:100%;max-width:390px;text-align:center}
  .brand-logo{width:118px;height:118px;object-fit:contain;display:block;margin:0 auto 16px}
  .logo{font-size:28px;font-weight:800;margin-bottom:8px}
  .sub{font-size:14px;color:#8a7d74;margin-bottom:24px;line-height:1.6}
  .btn{display:block;width:100%;padding:16px 0;background:#fe2c55;color:#fff;
       border:0;border-radius:8px;font-size:18px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn.secondary{margin-top:12px;background:#fff;color:#5c4f47;border:1px solid #d5cfc8;font-size:15px}
  .btn:active{transform:translateY(1px)}
  .wechat-guide{display:none;position:fixed;top:8px;right:8px;z-index:20;width:230px;text-align:right;pointer-events:none}
  body.is-wechat .wechat-guide{display:block}
  .guide-pill{display:inline-flex;flex-direction:column;align-items:center;gap:3px;padding:11px 13px;background:#fe2c55;color:#fff;
       border-radius:8px;font-size:16px;font-weight:900;box-shadow:0 12px 34px rgba(254,44,85,.42)}
  .guide-pill-row{display:flex;align-items:center;gap:6px}
  .dots{font-size:24px;line-height:1;margin-top:-3px;letter-spacing:1px}
  .guide-arrow{position:absolute;top:42px;right:4px;width:72px;height:76px;border-top:5px solid #fe2c55;
       border-right:5px solid #fe2c55;border-radius:0 18px 0 0;transform:rotate(-10deg)}
  .guide-arrow:after{content:"";position:absolute;right:-9px;top:-10px;width:18px;height:18px;border-top:5px solid #fe2c55;
       border-right:5px solid #fe2c55;transform:rotate(8deg)}
  .wechat-action{display:none;margin:0 0 14px;padding:16px;background:#fff;color:#5c4f47;border:1px solid #f5d5dd;border-radius:8px;
       text-align:left;box-shadow:0 14px 34px rgba(254,44,85,.08)}
  body.is-wechat .wechat-action{display:block}
  .action-kicker{font-size:13px;font-weight:700;color:#fe2c55;margin-bottom:4px}
  .action-main{font-size:24px;font-weight:900;line-height:1.2;color:#5c4f47}
  .action-sub{font-size:14px;font-weight:700;line-height:1.55;margin-top:9px;color:#7a6e65}
  .account{margin-top:18px;padding:12px 14px;border:1px solid #d5cfc8;border-radius:8px;color:#7a6e65;background:#fff;font-size:14px}
  .muted{margin-top:18px;color:#9a8e86;font-size:13px;line-height:1.7}
  body.is-wechat .direct-open{display:none}
  body.is-wechat .account{margin-top:12px}
  b{color:#5c4f47}
</style>
</head>
<body>
<div class="wechat-guide" aria-hidden="true">
  <div class="guide-arrow"></div>
  <div class="guide-pill"><div class="guide-pill-row"><span>点右上角</span><span class="dots">···</span></div><span style="font-size:12px;opacity:0.9">在浏览器打开 → 抖音</span></div>
</div>
<div class="card">
  <img class="brand-logo" alt="乐美文化AIGC" src="lemei_logo_transparent.png">
  <div class="logo">乐美文化AIGC</div>
  <div class="sub">AI短剧 · 广告影像 · 企业宣传<br>一站式 AI 视频解决方案</div>
  <div class="wechat-action" id="wechatAction">
    <div class="action-kicker">微信内需要通过浏览器打开</div>
    <div class="action-main">先点右上角「···」</div>
    <div class="action-sub">打开微信菜单，选择「在浏览器中打开」。</div>
  </div>
  <a class="btn direct-open" href="#" onclick="go(event)">打开抖音主页</a>
  <button class="btn secondary" onclick="copyAccount()">复制抖音号</button>
  <div class="account">抖音号：<b>1556511979</b></div>
  <div class="muted" id="copyState">微信无法直接打开时，可复制抖音号到抖音搜索。</div>
</div>
<script>
var target='https://www.douyin.com/user/MS4wLjABAAAAxYZ64xZOyD6HeZlTF-Jfc6JexLGND78urBHj-YkFHMw';
function go(e){e.preventDefault();
  var ua=navigator.userAgent.toLowerCase();
  var isWx=ua.indexOf('micromessenger')>-1;
  if(isWx){
    window.scrollTo({top:0,behavior:'smooth'});
    return
  }
  window.location.href=target
}
function copyAccount(){
  var text='1556511979';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      document.getElementById('copyState').textContent='已复制抖音号：1556511979';
    });
  }else{
    document.getElementById('copyState').textContent='抖音号：1556511979';
  }
}
(function(){
  var ua=navigator.userAgent.toLowerCase();
  if(ua.indexOf('micromessenger')>-1){
    document.body.classList.add('is-wechat');
  }else{
    setTimeout(function(){window.location.href=target},800)
  }
})()
</script>
</body>
</html>
